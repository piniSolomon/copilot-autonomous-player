  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Cookie Kingdom",
    "description": "Build your Cookie Kingdom! Click to bake cookies, buy upgrades, prestige for bonuses, and grow your empire.",
    "url": "https://pinisolomon.github.io/copilot-autonomous-player/games/cookie-kingdom/",
    "genre": ["Idle", "Clicker", "Casual"],
    "gamePlatform": "Web Browser",
    "applicationCategory": "Game",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a0a00;
      --surface: #2d1500;
      --surface2: #3d1f00;
      --accent: #ff8c00;
      --accent2: #ffb347;
      --text: #ffe8cc;
      --muted: #a06030;
      --green: #4caf50;
      --radius: 12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    header {
      background: var(--surface);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent);
    }
    header h1 { font-size: 1.4rem; color: var(--accent); }
    #total-display {
      text-align: center;
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      padding: 4px 16px;
      font-weight: bold;
      font-size: 0.95rem;
    }

    /* AD BANNER TOP */
    .ad-banner {
      background: var(--surface2);
      border: 1px dashed var(--muted);
      text-align: center;
      padding: 8px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .ad-banner-label { font-size: 0.65rem; display: block; margin-bottom: 2px; }

    .game-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      min-height: calc(100vh - 120px);
    }
    @media (max-width: 700px) {
      .game-layout { grid-template-columns: 1fr; }
      #shop-panel { order: 2; }
      #main-panel { order: 1; }
    }

    /* MAIN CLICK AREA */
    #main-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px 20px;
    }
    #score-box {
      text-align: center;
    }
    #score-box .label { font-size: 0.9rem; color: var(--muted); }
    #cookie-count {
      font-size: 2.8rem;
      font-weight: bold;
      color: var(--accent2);
      line-height: 1.1;
    }
    #cps-display { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

    #cookie-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      background: radial-gradient(circle at 40% 35%, #ffcc80, #ff8c00 70%, #cc5500);
      cursor: pointer;
      font-size: 80px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 30px rgba(255,140,0,0.4);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: visible;
    }
    #cookie-btn:active, #cookie-btn.clicked {
      transform: scale(0.93);
      box-shadow: 0 0 10px rgba(255,140,0,0.2);
    }
    .float-text {
      position: absolute;
      font-weight: bold;
      color: var(--accent2);
      font-size: 1.1rem;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 1px 3px #000;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }

    #prestige-info {
      font-size: 0.85rem;
      color: #ffd700;
      text-align: center;
      margin-top: 8px;
    }
    .prestige-btn {
      display: block;
      width: 100%;
      margin: 8px auto;
      padding: 12px 16px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      animation: pulse-gold 2s ease-in-out infinite;
    }
    .prestige-btn:hover { transform: scale(1.03); }
    .prestige-btn.hidden { display: none; }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
      50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
    }

    /* ACHIEVEMENTS */
    .achievement {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; margin: 4px 0;
      background: var(--surface2); border-radius: 8px;
      font-size: 0.85rem; opacity: 0.5;
      transition: opacity 0.3s, background 0.3s;
    }
    .achievement.unlocked { opacity: 1; background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); }
    .achievement-icon { font-size: 1.3rem; }
    .achievement-name { font-weight: bold; color: var(--text); }
    .achievement-desc { font-size: 0.75rem; color: var(--muted); }
    .achievement-toast {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white; padding: 12px 20px; border-radius: 10px;
      font-weight: bold; animation: slideIn 0.4s ease-out, fadeOut 0.5s 2.5s forwards;
      box-shadow: 0 4px 16px rgba(76,175,80,0.4);
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

    /* AD SIDE */
    .ad-side {
      background: var(--surface2);
      border: 1px dashed var(--muted);
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-radius: var(--radius);
      margin: 20px 0;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* SHOP */
    #shop-panel {
      background: var(--surface);
      border-left: 2px solid var(--surface2);
      padding: 16px;
      overflow-y: auto;
    }
    #shop-panel h2 {
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .upgrade-item {
      background: var(--surface2);
      border: 1px solid var(--muted);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .upgrade-item:hover:not(.locked) { border-color: var(--accent); background: #4d2500; }
    .upgrade-item.locked { opacity: 0.45; cursor: not-allowed; }
    .upgrade-icon { font-size: 1.8rem; flex-shrink: 0; }
    .upgrade-info { flex: 1; min-width: 0; }
    .upgrade-name { font-weight: bold; font-size: 0.9rem; }
    .upgrade-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .upgrade-cost {
      font-size: 0.85rem;
      font-weight: bold;
      color: var(--accent2);
      margin-top: 4px;
    }
    .upgrade-owned {
      font-size: 0.75rem;
      color: var(--green);
      margin-top: 2px;
    }

    /* Rewarded ad boost button */
    #rewarded-btn {
      display: block;
      width: 100%;
      margin: 0 0 12px;
      padding: 10px 12px;
      background: linear-gradient(135deg, #2d5a00, #3a7a00);
      border: 1px solid #4caf50;
      border-radius: var(--radius);
      color: #b9f6ca;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
      transition: filter 0.15s;
    }
    #rewarded-btn:hover { filter: brightness(1.2); }
    #rewarded-btn:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }
    #rewarded-btn .rb-icon { font-size: 1.4rem; vertical-align: middle; margin-right: 6px; }
    #rewarded-btn .rb-label { font-size: 0.7rem; color: #69cc80; display: block; margin-top: 2px; }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--surface2);
    }
    a { color: var(--accent2); }
  </style>
</head>
<body>
  <header>
    <h1>🍪 Cookie Kingdom</h1>
    <div id="total-display">Total: <span id="all-time-count">0</span></div>
  </header>

  <!-- Ad Banner Top -->
  <div class="ad-banner" id="ad-top">
    <span class="ad-banner-label">ADVERTISEMENT</span>
    <!-- GameMonetize SDK: replace with actual ad tag -->
    <div id="gamemonetize-top" style="min-height:50px; display:flex; align-items:center; justify-content:center; width:100%;">
      <span>[Ad Banner 728×90]</span>
    </div>
  </div>

  <div class="game-layout">
    <div id="main-panel">
      <div id="score-box">
        <div class="label">🍪 Cookies</div>
        <div id="cookie-count">0</div>
        <div id="cps-display">per second: 0</div>
      </div>

      <button id="cookie-btn" aria-label="Click to bake a cookie" title="Click to bake cookies!">🍪</button>

      <!-- Ad Side (shown on desktop) -->
      <div class="ad-side" id="ad-side">
        <span class="ad-banner-label">ADVERTISEMENT</span>
        <div id="gamemonetize-side" style="min-width:160px; min-height:200px; display:flex; align-items:center; justify-content:center;">

      <div id="prestige-info" aria-live="polite"></div>

        🌟 PRESTIGE — Reset for bonus
      </button>
      <button id="share-btn" style="display:block;width:100%;margin:6px auto;padding:8px;background:#1e88e5;color:white;border:none;border-radius:6px;font-size:0.85rem;cursor:pointer;" aria-label="Share your stats">📋 Share My Stats</button>

      <!-- Rewarded ad boost -->

        <span class="rb-icon">📺</span>Watch Ad — 2× Click Power (30s)
        <span class="rb-label">Free boost sponsored by ads</span>
      </button>
      <div id="shop-list"></div>

      <!-- Achievements -->
      <h2 style="margin-top:16px;">🏆 Achievements</h2>
      <div id="achievements-list"></div>
    </div>
  </div>

  <footer>
    <a href="../../index.html">← Back to Games</a> &nbsp;|&nbsp;
    Cookie Kingdom v1.1 &nbsp;|&nbsp;
    <span id="save-status">Auto-saved</span>
  </footer>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const SAVE_KEY = 'ck_save_v2';
    let state = {
      cookies: 0,
      allTime: 0,
      cps: 0,
      clickPower: 1,
      upgrades: {},
      prestige: 0,       // prestige level (number of resets)
      prestigeStars: 0,  // total stars earned
      lifetimeCookies: 0 // cookies across ALL prestiges
    };

    // Migrate from v1 save
    (function migrateV1() {
      try {
        const v1 = localStorage.getItem('ck_save_v1');
        if (v1 && !localStorage.getItem(SAVE_KEY)) {
          const parsed = JSON.parse(v1);
          parsed.prestige = 0;
          parsed.prestigeStars = 0;
          parsed.lifetimeCookies = parsed.allTime || 0;
          localStorage.setItem(SAVE_KEY, JSON.stringify(parsed));
          localStorage.removeItem('ck_save_v1');
        }
      } catch(e) {}
    })();

    const UPGRADES = [
      {
        id: 'cursor',
        name: 'Magic Cursor',
        icon: '👆',
        desc: 'Adds +1 cookie/click automatically',
        baseCost: 15,
        cpsBonus: 0.1,
        clickBonus: 1,
        costMult: 1.15,
      },
      {
        id: 'grandma',
        name: 'Grandma',
        icon: '👵',
        desc: 'A kindly grandma who bakes 2 cookies/sec',
        baseCost: 100,
        cpsBonus: 2,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'farm',
        name: 'Cookie Farm',
        icon: '🌾',
        desc: 'Grows cookie plants: 10 cookies/sec',
        baseCost: 500,
        cpsBonus: 10,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'factory',
        name: 'Cookie Factory',
        icon: '🏭',
        desc: 'Industrial scale: 50 cookies/sec',
        baseCost: 3000,
        cpsBonus: 50,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'mine',
        name: 'Cookie Mine',
        icon: '⛏️',
        desc: 'Mines chocolate chips: 200 cookies/sec',
        baseCost: 10000,
        cpsBonus: 200,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'spaceship',
        name: 'Cookie Rocket',
        icon: '🚀',
        desc: 'Space-baked cookies: 1000 cookies/sec',
        baseCost: 50000,
        cpsBonus: 1000,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'power',
        name: 'Power Click',
        icon: '⚡',
        desc: '+5 cookies per click',
        baseCost: 200,
        cpsBonus: 0,
        clickBonus: 5,
        costMult: 1.4,
      },
      {
        id: 'golden',
        name: 'Golden Cookie',
        icon: '🌟',
        desc: '+20 cookies per click',
        baseCost: 1500,
        cpsBonus: 0,
        clickBonus: 20,
        costMult: 1.4,
      },
      {
        id: 'portal',
        name: 'Cookie Portal',
        icon: '🌀',
        desc: 'Interdimensional cookies: 5K cookies/sec',
        baseCost: 250000,
        cpsBonus: 5000,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'alchemy',
        name: 'Alchemy Lab',
        icon: '⚗️',
        desc: 'Transmutes gold into cookies: 25K cookies/sec',
        baseCost: 1500000,
        cpsBonus: 25000,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'timemachine',
        name: 'Time Machine',
        icon: '⏰',
        desc: 'Harvests past cookies: 100K cookies/sec',
        baseCost: 10000000,
        cpsBonus: 100000,
        clickBonus: 0,
        costMult: 1.15,
      },
      {
        id: 'diamond',
        name: 'Diamond Click',
        icon: '💎',
        desc: '+100 cookies per click',
        baseCost: 50000,
        cpsBonus: 0,
        clickBonus: 100,
        costMult: 1.5,
      },
    ];

    // ── Helpers ────────────────────────────────────────────────────────────
    function fmt(n) {
      if (n >= 1e12) return (n / 1e12).toFixed(2) + ' T';
      if (n >= 1e9)  return (n / 1e9).toFixed(2) + ' B';
      if (n >= 1e6)  return (n / 1e6).toFixed(2) + ' M';
      if (n >= 1e3)  return (n / 1e3).toFixed(1) + ' K';
      return Math.floor(n).toString();
    }

    function upgradeCount(id) { return state.upgrades[id] || 0; }

    function upgradeCost(u) {
      const owned = upgradeCount(u.id);
      return Math.ceil(u.baseCost * Math.pow(u.costMult, owned));
    }

    function recalc() {
      let cps = 0, cp = 1;
      UPGRADES.forEach(u => {
        const owned = upgradeCount(u.id);
        cps += u.cpsBonus * owned;
        cp  += u.clickBonus * owned;
      });
      // Prestige multiplier: +10% per star
      const prestigeMult = 1 + (state.prestigeStars * 0.10);
      state.cps = cps * prestigeMult;
      state.clickPower = cp * prestigeMult;
    }

    // Calculate prestige stars earned from current run
    function calcPrestigeStars() {
      // Stars = floor(sqrt(allTime / 1,000,000))
      return Math.floor(Math.sqrt(state.allTime / 1_000_000));
    }

    function doPrestige() {
      const newStars = calcPrestigeStars();
      if (newStars < 1) return;
      state.prestigeStars += newStars;
      state.prestige++;
      state.lifetimeCookies += state.allTime;
      // Reset progress
      state.cookies = 0;
      state.allTime = 0;
      state.upgrades = {};
      recalc();
      renderScores();
      renderShop();
      renderPrestige();
      save();
    }

    // ── Save / Load ────────────────────────────────────────────────────────
    function save() {
      try {
        state.lastSaveTime = Date.now();
        localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        document.getElementById('save-status').textContent = 'Saved ✓';
        setTimeout(() => {
          document.getElementById('save-status').textContent = 'Auto-saved';
        }, 1500);
      } catch (e) { /* storage unavailable */ }
    }

    function load() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          Object.assign(state, parsed);
        }
      } catch (e) { /* corrupt save, start fresh */ }
      recalc();
      // Offline progress: award cookies for time away (50% of CPS rate)
      if (state.lastSaveTime && state.cps > 0) {
        const elapsed = (Date.now() - state.lastSaveTime) / 1000;
        if (elapsed > 30) { // at least 30s away
          const maxOffline = 8 * 3600; // cap at 8 hours
          const offlineSec = Math.min(elapsed, maxOffline);
          const offlineEarnings = Math.floor(state.cps * offlineSec * 0.5);
          if (offlineEarnings > 0) {
            state.cookies += offlineEarnings;
            state.allTime += offlineEarnings;
            showOfflineBonus(offlineEarnings, offlineSec);
          }
        }
      }
    }

    function showOfflineBonus(amount, seconds) {
      const mins = Math.floor(seconds / 60);
      const hours = Math.floor(mins / 60);
      const timeStr = hours > 0 ? `${hours}h ${mins % 60}m` : `${mins}m`;
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#1e88e5,#1565c0);color:white;padding:24px 32px;border-radius:16px;text-align:center;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideIn 0.4s ease-out;';
      banner.innerHTML = `<div style="font-size:1.5rem;margin-bottom:8px;">🌙 Welcome Back!</div><div>You were away for <b>${timeStr}</b></div><div style="font-size:1.3rem;margin-top:8px;color:#ffeb3b;">+${fmt(amount)} cookies earned offline</div><div style="margin-top:12px;font-size:0.8rem;opacity:0.7;">50% of production while away (max 8h)</div>`;
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 5000);
    }

    // ── UI ─────────────────────────────────────────────────────────────────
    function renderScores() {
      document.getElementById('cookie-count').textContent = fmt(state.cookies);
      document.getElementById('all-time-count').textContent = fmt(state.allTime);
      document.getElementById('cps-display').textContent = `per second: ${fmt(state.cps)}`;
    }

    function renderShop() {
      const list = document.getElementById('shop-list');
      list.innerHTML = '';
      UPGRADES.forEach(u => {
        const cost = upgradeCost(u);
        const owned = upgradeCount(u.id);
        const canAfford = state.cookies >= cost;
        const div = document.createElement('div');
        div.className = 'upgrade-item' + (canAfford ? '' : ' locked');
        div.setAttribute('data-id', u.id);
        div.setAttribute('role', 'button');
        div.setAttribute('aria-label', `Buy ${u.name} for ${fmt(cost)} cookies`);
        div.setAttribute('tabindex', canAfford ? '0' : '-1');
        div.innerHTML = `
          <div class="upgrade-icon">${u.icon}</div>
          <div class="upgrade-info">
            <div class="upgrade-name">${u.name}</div>
            <div class="upgrade-desc">${u.desc}</div>
            <div class="upgrade-cost">🍪 ${fmt(cost)}</div>
            ${owned > 0 ? `<div class="upgrade-owned">Owned: ${owned}</div>` : ''}
          </div>`;
        if (canAfford) {
          div.addEventListener('click', () => buyUpgrade(u.id));
          div.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') buyUpgrade(u.id); });
        }
        list.appendChild(div);
      });
    }

    // ── Actions ────────────────────────────────────────────────────────────
    function addCookies(n, source) {
      state.cookies += n;
      state.allTime += n;
      renderScores();
    }

    function buyUpgrade(id) {
      const u = UPGRADES.find(x => x.id === id);
      if (!u) return;
      const cost = upgradeCost(u);
      if (state.cookies < cost) return;
      state.cookies -= cost;
      state.upgrades[id] = (state.upgrades[id] || 0) + 1;
      recalc();
      renderScores();
      renderShop();
      save();
    }

    // Cookie click with floating "+N" text
    const cookieBtn = document.getElementById('cookie-btn');
    cookieBtn.addEventListener('click', function(e) {
      addCookies(state.clickPower, 'click');
      this.classList.add('clicked');
      setTimeout(() => this.classList.remove('clicked'), 80);

      // Floating text
      const span = document.createElement('span');
      span.className = 'float-text';
      span.textContent = '+' + fmt(state.clickPower);
      const rect = this.getBoundingClientRect();
      span.style.left = (e.clientX - rect.left - 12) + 'px';
      span.style.top = (e.clientY - rect.top - 20) + 'px';
      this.appendChild(span);
      setTimeout(() => span.remove(), 820);

      renderShop(); // refresh affordability
    });

    // ── Game Loop ──────────────────────────────────────────────────────────
    let lastTick = Date.now();
    function gameTick() {
      const now = Date.now();
      const dt = (now - lastTick) / 1000;
      lastTick = now;
      if (state.cps > 0) {
        addCookies(state.cps * dt, 'passive');
      }
      requestAnimationFrame(gameTick);
    }

    // Render shop at lower frequency (500ms) to avoid constant DOM churn
    setInterval(renderShop, 500);

    // Auto-save every 10 seconds
    setInterval(save, 10_000);

    // Prestige system
    function renderPrestige() {
      const info = document.getElementById('prestige-info');
      const btn = document.getElementById('prestige-btn');
      const pendingStars = calcPrestigeStars();
      
      if (state.prestigeStars > 0) {
        info.innerHTML = `⭐ ${state.prestigeStars} stars (×${(1 + state.prestigeStars * 0.10).toFixed(1)} bonus) | Prestige #${state.prestige}`;
      }
      
      if (pendingStars >= 1) {
        btn.classList.remove('hidden');
        btn.textContent = `🌟 PRESTIGE — Earn ${pendingStars} star${pendingStars > 1 ? 's' : ''} (+${pendingStars * 10}% bonus)`;
      } else {
        btn.classList.add('hidden');
        if (state.allTime < 1_000_000) {
          info.innerHTML += state.prestigeStars > 0 ? '' : `<br><small>Reach 1M cookies to unlock prestige</small>`;
        }
      }
    }
    
    document.getElementById('prestige-btn').addEventListener('click', function() {
      const stars = calcPrestigeStars();
      if (stars < 1) return;
      if (confirm(`Prestige now?\n\nYou'll earn ${stars} star(s) (+${stars * 10}% permanent bonus)\nYour cookies and upgrades will reset.`)) {
        doPrestige();
      }
    });
    
    setInterval(renderPrestige, 2000);

    // ── Achievements ────────────────────────────────────────────────────────
    const ACHIEVEMENTS = [
      { id: 'first_click', icon: '👆', name: 'First Click', desc: 'Bake your first cookie', check: () => state.allTime >= 1 },
      { id: 'hundred', icon: '💯', name: 'Century', desc: 'Bake 100 cookies', check: () => state.allTime >= 100 },
      { id: 'thousand', icon: '🎯', name: 'Thousandaire', desc: 'Bake 1,000 cookies', check: () => state.allTime >= 1000 },
      { id: 'ten_k', icon: '🔥', name: 'On Fire', desc: 'Bake 10,000 cookies', check: () => state.allTime >= 10000 },
      { id: 'hundred_k', icon: '⭐', name: 'Cookie Star', desc: 'Bake 100,000 cookies', check: () => state.allTime >= 100000 },
      { id: 'million', icon: '👑', name: 'Cookie King', desc: 'Bake 1,000,000 cookies', check: () => state.allTime >= 1000000 },
      { id: 'first_upgrade', icon: '🛒', name: 'Shopper', desc: 'Buy your first upgrade', check: () => Object.values(state.upgrades).some(v => v > 0) },
      { id: 'ten_upgrades', icon: '🏪', name: 'Big Spender', desc: 'Own 10 total upgrades', check: () => Object.values(state.upgrades).reduce((a,b) => a+b, 0) >= 10 },
      { id: 'first_prestige', icon: '🌟', name: 'Reborn', desc: 'Prestige for the first time', check: () => state.prestige >= 1 },
      { id: 'five_prestige', icon: '💎', name: 'Veteran', desc: 'Prestige 5 times', check: () => state.prestige >= 5 },
      { id: 'cps_100', icon: '⚡', name: 'Speed Baker', desc: 'Reach 100 cookies/sec', check: () => state.cps >= 100 },
      { id: 'cps_1000', icon: '🚀', name: 'Hyperdrive', desc: 'Reach 1,000 cookies/sec', check: () => state.cps >= 1000 },
      { id: 'ten_million', icon: '🏆', name: 'Mega Baker', desc: 'Bake 10,000,000 cookies', check: () => state.allTime >= 10000000 },
      { id: 'billion', icon: '🌍', name: 'World Baker', desc: 'Bake 1,000,000,000 cookies', check: () => state.allTime >= 1000000000 },
      { id: 'cps_10k', icon: '🌀', name: 'Portal Master', desc: 'Reach 10,000 cookies/sec', check: () => state.cps >= 10000 },
      { id: 'cps_100k', icon: '⏰', name: 'Time Lord', desc: 'Reach 100,000 cookies/sec', check: () => state.cps >= 100000 },
    ];

    let unlockedAchievements = JSON.parse(localStorage.getItem('ck_achievements') || '[]');

    function checkAchievements() {
      ACHIEVEMENTS.forEach(a => {
        if (!unlockedAchievements.includes(a.id) && a.check()) {
          unlockedAchievements.push(a.id);
          localStorage.setItem('ck_achievements', JSON.stringify(unlockedAchievements));
          showAchievementToast(a);
          renderAchievements();
        }
      });
    }

    function showAchievementToast(a) {
      const toast = document.createElement('div');
      toast.className = 'achievement-toast';
      toast.textContent = `🏆 ${a.icon} ${a.name}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function renderAchievements() {
      const list = document.getElementById('achievements-list');
      list.innerHTML = ACHIEVEMENTS.map(a => {
        const unlocked = unlockedAchievements.includes(a.id);
        return `<div class="achievement ${unlocked ? 'unlocked' : ''}">
          <span class="achievement-icon">${unlocked ? a.icon : '🔒'}</span>
          <div><div class="achievement-name">${a.name}</div><div class="achievement-desc">${a.desc}</div></div>
        </div>`;
      }).join('');
    }

    renderAchievements();
    setInterval(checkAchievements, 1000);

    // ── GameMonetize Ad SDK Integration ────────────────────────────────────
    // SDK_OPTIONS pattern (required for ads to serve)
    window.SDK_OPTIONS = {
      gameId: "ck_cookie_kingdom_01", // TODO: replace with real gameId from GameMonetize dashboard
      onEvent: function(event) {
        switch (event.name) {
          case "SDK_GAME_PAUSE":
            // Pause game & mute audio during ads
            window.__gamePaused = true;
            break;
          case "SDK_GAME_START":
            // Resume game after ad
            window.__gamePaused = false;
            break;
          case "SDK_READY":
            // SDK loaded and ready
            window.__adReady = true;
            break;
        }
      }
    };

    // Legacy callback (some SDK versions still call this)
    window['initGmSdk'] = function(SDK) {
      window.sdk = SDK;
      window.__adReady = true;
      SDK.gameStart();
    };

    // Fallback: if SDK fails to load (ad-blocked / not on GM platform),
    // still mark ready so game continues normally
    var _adFallbackTimer = setTimeout(function() {
      if (!window.__adReady) {
        window.sdk = null;
        window.__adReady = true; // fallback ready flag for E2E tests
      }
    }, 5000);

    // ── Rewarded Ad (2x click power for 30s) ───────────────────────────────
    var _boostActive = false;
    var _boostTimer = null;
    var _origClickPower = 1;

    function showRewardedAd() {
      var btn = document.getElementById('rewarded-btn');
      if (window.sdk && typeof window.sdk.showRewardedVideo === 'function') {
        btn.disabled = true;
        window.sdk.showRewardedVideo(function(hasRewarded) {
          btn.disabled = false;
          if (hasRewarded) applyClickBoost();
        });
      } else {
        // SDK not yet loaded (first visit / ad-blocked) — graceful fallback
        applyClickBoost();
      }
    }

    function applyClickBoost() {
      if (_boostActive) { clearTimeout(_boostTimer); }
      _boostActive = true;
      _origClickPower = state.clickPower;
      state.clickPower *= 2;
      var btn = document.getElementById('rewarded-btn');
      btn.textContent = '⏳ 2× ACTIVE — 30s remaining';
      btn.disabled = true;
      _boostTimer = setTimeout(function() {
        _boostActive = false;
        state.clickPower = _origClickPower;
        btn.disabled = false;
        btn.innerHTML = '<span class="rb-icon">📺</span>Watch Ad — 2× Click Power (30s)<span class="rb-label">Free boost sponsored by ads</span>';
      }, 30000);
    }

    document.getElementById('rewarded-btn').addEventListener('click', showRewardedAd);

    // Share button
    document.getElementById('share-btn').addEventListener('click', function() {
      const unlocked = unlockedAchievements.length;
      const total = ACHIEVEMENTS.length;
      const text = `🍪 Cookie Kingdom Stats 🍪\n` +
        `All-time: ${fmt(state.allTime + state.lifetimeCookies)} cookies\n` +
        `CPS: ${fmt(state.cps)}/sec\n` +
        `Prestige: ${state.prestige}× (${state.prestigeStars} ⭐)\n` +
        `Achievements: ${unlocked}/${total} 🏆\n` +
        `Play free: https://pinisolomon.github.io/copilot-autonomous-player/games/cookie-kingdom/`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          this.textContent = '✅ Copied to clipboard!';
          setTimeout(() => { this.textContent = '📋 Share My Stats'; }, 2000);
        });
      }
    });

    // ── Init ───────────────────────────────────────────────────────────────
    load();
    renderScores();
    renderShop();
    requestAnimationFrame(gameTick);
  </script>
  <!-- GameMonetize SDK — loaded via SDK_OPTIONS pattern -->
  <script id="gamemonetize-sdk" src="https://api.gamemonetize.com/sdk.js" async></script>
</body>
</html>
